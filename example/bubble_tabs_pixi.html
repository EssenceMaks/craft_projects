<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Bubbles Pro — PixiJS Engine</title>
    <script src="https://pixijs.download/v7.3.2/pixi.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0d17;
            --panel-bg: rgba(20, 22, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #e0e6ed;
            --accent: #5e6ad2
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            user-select: none
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            width: 100vw
        }

        #pixi-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 1000
        }

        #toolbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            align-items: center;
            z-index: 1001
        }

        #link-tools {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 15px;
            padding: 10px 20px;
            align-items: center;
            z-index: 1000
        }

        #properties-panel {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 340px;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 15px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            z-index: 1000
        }

        #properties-panel::-webkit-scrollbar {
            width: 6px
        }

        #properties-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 12, 20, 0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: opacity 0.5s ease;
        }

        .login-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 40px;
            text-align: center;
            color: #fff;
            letter-spacing: 1px;
        }

        #user-grid {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .user-name {
            font-size: 18px;
            font-weight: 500;
        }

        #pin-screen {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .pin-dots {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: all 0.2s;
        }

        .pin-dot.filled {
            background: #fff;
            border-color: #fff;
            box-shadow: 0 0 10px #fff;
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .pin-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
        }

        .pin-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .pin-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.25);
        }

        #pin-error {
            color: #ff4444;
            margin-top: 15px;
            min-height: 20px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .pin-shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-2px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(4px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-8px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(8px, 0, 0);
            }
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            position: relative;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 5px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: none;
            flex-direction: column;
            gap: 2px;
            padding: 5px;
            min-width: 150px;
            z-index: 2000;
        }

        .dropdown-menu button {
            background: transparent;
            border: none;
            justify-content: flex-start;
            padding: 8px 12px;
            border-radius: 4px;
        }

        .dropdown-menu button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .icon-btn {
            padding: 6px;
            width: 32px;
            height: 32px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            max-height: 150px;
            overflow-y: auto;
            padding: 5px;
        }

        .emoji-grid div {
            padding: 5px;
            text-align: center;
            cursor: pointer;
            border-radius: 4px;
        }

        .emoji-grid div:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .slider-sm {
            width: 80px !important;
        }

        button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2)
        }

        button.active {
            background: var(--accent);
            border-color: #7b88ff;
            box-shadow: 0 0 15px var(--accent)
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed
        }

        .action-btn {
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.5);
            padding: 4px 8px;
            font-size: 12px
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px
        }

        .form-group.row {
            flex-direction: row;
            justify-content: space-between;
            align-items: center
        }

        .form-group label {
            font-size: 12px;
            color: #a0aabf
        }

        input[type="text"],
        input[type="number"],
        select,
        input[type="range"] {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px;
            border-radius: 6px;
            outline: none;
            flex: 1;
            min-width: 0
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer
        }

        input[type="color"] {
            background: none;
            border: none;
            width: 100%;
            height: 30px;
            cursor: pointer;
            padding: 0
        }

        .divider {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 5px
        }

        #ctx-menu {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            font-size: 13px;
            z-index: 2000;
            display: none;
            flex-direction: column;
            gap: 2px;
            backdrop-filter: blur(10px)
        }

        .ctx-btn {
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.2s;
            white-space: nowrap
        }

        .ctx-btn:hover {
            background: rgba(255, 255, 255, 0.1)
        }

        .ctx-btn.danger {
            color: #ff5555
        }

        .ctx-btn.danger:hover {
            background: rgba(255, 85, 85, 0.2)
        }

        .layer-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px
        }

        body.eco-mode .glass-panel,
        body.eco-mode #ctx-menu {
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important
        }

        .bound-btn {
            position: absolute;
            background: rgba(94, 106, 210, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, background 0.2s;
            backdrop-filter: blur(5px);
            font-weight: bold;
            font-family: sans-serif;
            border-radius: 8px;
        }

        .bound-btn:hover {
            background: rgba(123, 136, 255, 0.9);
        }

        .bound-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #bound-left {
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 100px;
        }

        #bound-right {
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 100px;
        }

        #bound-top {
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 40px;
        }

        #bound-bottom {
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 40px;
        }

        /* Login Screen Styles */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        #user-screen,
        #pin-screen {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .login-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            color: var(--accent);
        }

        #user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .user-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
        }

        #pin-screen {
            display: none;
            /* Hidden by default */
            flex-direction: column;
            align-items: center;
        }

        .pin-dots {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            height: 20px;
        }

        .pin-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            background: transparent;
            transition: background 0.1s;
        }

        .pin-dot.filled {
            background: var(--accent);
            border-color: var(--accent);
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 280px;
            margin-top: 20px;
        }

        .pin-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            user-select: none;
        }

        .pin-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent);
        }

        .pin-btn:active {
            background: var(--accent);
            border-color: var(--accent);
        }

        #pin-error {
            color: #ff5555;
            margin-top: 20px;
            font-size: 14px;
            visibility: hidden;
            /* Hidden by default */
        }
    </style>
    <script id="saved-state">window.APP_STATE = null;</script>
</head>

<body>
    <!-- LOGIN OVERLAY -->
    <div id="login-overlay">
        <div id="user-screen">
            <div class="login-title">Выберите пользователя</div>
            <div id="user-grid">
                <!-- Users injected here -->
            </div>
        </div>

        <div id="pin-screen">
            <div style="display:flex; align-items:center; gap:20px; margin-bottom: 20px;">
                <button id="btn-back-users"
                    style="background:transparent; border:none; color:rgba(255,255,255,0.6); cursor:pointer; font-size:16px;">←
                    Назад</button>
                <div class="login-title" style="margin-bottom:0;" id="pin-user-name">Ввод PIN</div>
            </div>

            <div class="user-avatar" id="pin-user-avatar"
                style="margin-bottom:0; width:60px; height:60px; font-size:28px;"></div>

            <div class="pin-dots" id="pin-dots">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>

            <div class="pin-pad">
                <div class="pin-btn" onclick="enterPin(1)">1</div>
                <div class="pin-btn" onclick="enterPin(2)">2</div>
                <div class="pin-btn" onclick="enterPin(3)">3</div>
                <div class="pin-btn" onclick="enterPin(4)">4</div>
                <div class="pin-btn" onclick="enterPin(5)">5</div>
                <div class="pin-btn" onclick="enterPin(6)">6</div>
                <div class="pin-btn" onclick="enterPin(7)">7</div>
                <div class="pin-btn" onclick="enterPin(8)">8</div>
                <div class="pin-btn" onclick="enterPin(9)">9</div>
                <div></div>
                <div class="pin-btn" onclick="enterPin(0)">0</div>
                <div class="pin-btn" onclick="clearPin()"
                    style="font-size:18px; background:transparent; border:none; color:rgba(255,255,255,0.5);">Clear
                </div>
            </div>
            <div id="pin-error">Неверный PIN</div>
        </div>
    </div>


    <div id="toolbar" class="glass-panel" style="display:none; transition: transform 0.3s; cursor: grab;">
        <!-- Drag Handle -->
        <div id="tb-drag"
            style="padding: 0 10px; cursor: grab; opacity: 0.5; font-size: 18px; display: flex; align-items: center;"
            title="Перетащить панель">⋮⋮</div>
        <div id="fps-counter"
            style="position:absolute; bottom:-18px; left:8px; font-size:10px; color:#00ffcc; font-weight:bold; letter-spacing:1px; white-space:nowrap; pointer-events:none; font-family:'Segoe UI', sans-serif;">
            60 FPS</div>
        <!-- Tool Groups Wrapper -->
        <div id="tb-content" style="display: flex; gap: 10px; align-items: center;">
            <!-- BLOCK 1: Create Tools -->
            <div class="toolbar-group" style="position: relative;">
                <button id="btn-master-create" style="width:160px; justify-content:space-between;" data-val="main">
                    <span id="btn-master-label">🟡 Создать бабл</span>
                    <span id="btn-master-dd" style="font-size:10px; opacity:0.6; padding-left: 10px;">▼</span>
                </button>
                <div id="create-dropdown" class="dropdown-menu">
                    <!-- Javascript will populate this dynamically -->
                </div>
            </div>

            <div class="divider"></div>

            <!-- BLOCK 2: Global Pattern -->
            <div class="toolbar-group" style="position: relative; display: flex;">
                <button id="btn-global-pattern" title="Глобальный паттерн"
                    style="justify-content:space-between; width:170px;">
                    <span>🌍 <span id="gp-label" style="font-size:12px;">Выкл</span></span>
                    <span style="font-size:10px; opacity:0.6;">▼</span>
                </button>
                <div id="gp-dropdown" class="dropdown-menu" style="min-width:280px; left:auto; right:0;">
                    <div style="font-size:11px; color:#a0aabf; margin-bottom:5px; padding:0 5px;">СТИЛЬ ЛИНИИ</div>
                    <div style="display:flex; gap:5px; padding:0 5px; margin-bottom:10px;">
                        <button class="icon-btn gp-mode-btn" data-mode="off" title="Выкл" style="flex:1">❌</button>
                        <button class="icon-btn gp-mode-btn" data-mode="pixi_dash" title="Пунктир"
                            style="flex:1">---</button>
                        <button class="icon-btn gp-mode-btn" data-mode="dots" title="Точки" style="flex:1">...</button>
                    </div>

                    <div style="font-size:11px; color:#a0aabf; margin-bottom:5px; padding:0 5px;">ФИГУРЫ</div>
                    <div style="display:flex; gap:5px; padding:0 5px; margin-bottom:10px;">
                        <button class="icon-btn gp-shape-btn" data-shape="drop" title="Капля">💧</button>
                        <button class="icon-btn gp-shape-btn" data-shape="cube" title="Куб">🧊</button>
                        <button class="icon-btn gp-shape-btn" data-shape="hex" title="Гексагон">⬡</button>
                        <button class="icon-btn gp-shape-btn" data-shape="dec" title="Круг">⚪</button>
                    </div>

                    <div style="font-size:11px; color:#a0aabf; margin-bottom:5px; padding:0 5px;">ЭМОДЖИ / СИМВОЛЫ</div>
                    <div style="display:flex; gap:5px; padding:0 5px; margin-bottom:10px;">
                        <button class="icon-btn gp-mode-btn" data-mode="pixi_symbols"
                            title="Включить эмоджи">😀</button>
                        <input type="text" id="gp-emoji-input" value="✨❤️⭐" style="flex:1; font-size:14px;">
                        <button id="gp-emoji-picker-btn" class="icon-btn" title="Выбрать эмоджи">▼</button>
                    </div>
                    <div id="gp-emoji-picker" class="emoji-grid"
                        style="display:none; border:1px solid rgba(255,255,255,0.1); margin-bottom:10px; background:rgba(0,0,0,0.8); z-index: 100; max-height: 200px; overflow-y: auto;">
                        <!-- Filled by JS -->
                    </div>

                    <div style="font-size:11px; color:#a0aabf; margin-bottom:5px; padding:0 5px;">ОСОБЫЕ (В Разраб.)
                    </div>
                    <div style="display:flex; gap:5px; padding:0 5px; margin-bottom:10px; opacity:0.5;">
                        <button class="icon-btn" style="flex:1">SVG</button>
                        <button class="icon-btn" style="flex:1">PNG</button>
                        <button class="icon-btn" style="flex:1">💎</button>
                    </div>

                    <div style="font-size:11px; color:#a0aabf; margin-bottom:5px; padding:0 5px;">ПАРАМЕТРЫ</div>
                    <div class="form-group row" style="padding:0 5px;">
                        <label>Размер</label>
                        <input type="range" id="gp-size" class="slider-sm" min="0.5" max="3" step="0.1" value="1">
                    </div>
                    <div class="form-group row" style="padding:0 5px;">
                        <label>Плотность</label>
                        <input type="range" id="gp-count" class="slider-sm" min="0.1" max="10" step="0.1" value="1">
                    </div>
                    <div class="form-group row" style="padding:0 5px;">
                        <label>Скорость</label>
                        <select id="gp-speed-mode"
                            style="padding:2px 4px;font-size:11px;margin-right:5px;max-width:70px;">
                            <option value="abs" selected>Пикс/сек</option>
                            <option value="rel">Сек/линию</option>
                        </select>
                        <input type="number" id="gp-speed" min="1" max="1000" step="0.5" value="50"
                            style="width:50px; font-size:12px;">
                    </div>
                    <div class="form-group row" style="padding:0 5px; margin-top:5px;">
                        <label>Эффект свечения</label>
                        <input type="checkbox" id="gp-has-glow" checked>
                    </div>
                    <div class="form-group row" style="padding:0 5px; margin-top:5px;">
                        <label>Показывать траектории</label>
                        <input type="checkbox" id="gp-show-lines" checked>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <!-- BLOCK 3: Animation Controls -->
            <div class="toolbar-group">
                <button id="btn-anim-play" class="icon-btn active" title="Играть анимацию">▶️</button>
                <button id="btn-anim-pause" class="icon-btn" title="Пауза">⏸️</button>
                <button id="btn-anim-solid" class="icon-btn" title="Сплошные линии">➖</button>
            </div>

            <!-- BLOCK 4: History -->
            <div class="toolbar-group" style="margin-left:auto;">
                <button id="btn-undo" class="icon-btn" disabled title="Назад">↩</button>
                <button id="btn-redo" class="icon-btn" disabled title="Вперед">↪</button>
            </div>

            <div class="divider"></div>
            <button id="btn-load" style="background:#4a7da3; padding:8px;" title="Загрузить">📂</button>
            <input type="file" id="file-load" accept=".json" style="display:none;">
            <button id="btn-save" style="background:#2a7d43; padding:8px;" title="Сохранить">💾</button>
            <button id="btn-toggle-minimap" class="icon-btn" title="Показать/скрыть миникарту (M)"
                style="font-size:16px;">🗺️</button>
            <button id="btn-camera-mode" class="icon-btn" title="Снять ограничения камеры"
                style="width:auto; padding:0 8px; font-size:12px; margin-left:5px;">🎥 Ограничена</button>
        </div>
        <!-- Collapse Handle -->
        <div id="tb-collapse"
            style="padding: 0 10px; cursor: pointer; opacity: 0.8; font-size: 14px; display: flex; align-items: center;"
            title="Свернуть/Развернуть">◀</div>
    </div>

    <!-- Camera Bounds Expansion Blocks -->
    <div id="bound-left" class="bound-btn">+</div>
    <div id="bound-right" class="bound-btn">+</div>
    <div id="bound-top" class="bound-btn">+</div>
    <div id="bound-bottom" class="bound-btn">+</div>

    <div id="link-tools" class="glass-panel">
        <div style="display:flex;gap:5px;align-items:center;"><label
                style="font-size:12px;color:#a0aabf;">Траектория:</label><select id="lt-type"
                style="padding:4px 8px;font-size:12px;height:auto;">
                <option value="sharp" selected>Ломаная</option>
                <option value="curved">Плавная</option>
                <option value="ortho">Ортогональная</option>
                <option value="bent">Bent Connector</option>
            </select></div>
        <div style="display:flex;gap:5px;align-items:center;"><label
                style="font-size:12px;color:#a0aabf;">Вид:</label><select id="lt-mode"
                style="padding:4px 8px;font-size:12px;height:auto;">
                <option value="single" selected>Одинарная</option>
                <option value="double">Двойная</option>
            </select></div>
        <div style="display:flex;gap:5px;align-items:center;"><label
                style="font-size:12px;color:#a0aabf;">Цвет:</label><input type="color" id="lt-color" value="#00ffcc"
                style="width:25px;height:25px;padding:0;border:none;cursor:pointer;background:transparent;"></div>
    </div>
    <div id="ctx-menu"></div>
    <div id="properties-panel" class="glass-panel"
        style="display:none; position:absolute; z-index:2000; width:280px; max-height:80vh; overflow-y:auto; overflow-x:hidden; background:rgba(15, 23, 42, 0.95); padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); backdrop-filter:blur(10px); flex-direction:column;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3 id="prop-title" style="margin:0; cursor:grab; user-select:none;"><span
                    style="opacity:0.5; margin-right:5px;">⋮⋮</span>Свойства</h3>
            <button onclick="selectEntity(null, null)"
                style="background:none; border:none; color:white; cursor:pointer; font-size:16px; opacity:0.7;"
                title="Закрыть">✖</button>
        </div>
        <div id="global-props" style="display:none;">
            <div class="layer-box" style="border-color:rgba(0,255,204,0.5);background:rgba(0,255,204,0.05);">
                <strong style="font-size:13px;color:#00ffcc;">Глобальный Паттерн Анимации</strong>
                <div class="form-group" style="margin-top:10px;"><label>Режим</label><select id="prop-global-mode">
                        <option value="pixi_dash">Пунктир (GPU)</option>
                        <option value="pixi_shapes">Фигуры</option>
                        <option value="pixi_energy">Энергия</option>
                        <option value="pixi_symbols">Эмодзи</option>
                    </select></div>
                <div class="form-group" id="wrap-global-shape" style="display:none;margin-top:5px;">
                    <label>Фигура</label><select id="prop-global-shape">
                        <option value="drop">Капля</option>
                        <option value="cube">Куб</option>
                        <option value="hex">Шестигранник</option>
                        <option value="dec">Круг</option>
                    </select>
                </div>
                <div class="form-group" id="wrap-global-emojis" style="display:none;margin-top:5px;">
                    <label>Эмодзи</label><input type="text" id="prop-global-emojis" placeholder="❤️⭐✨">
                </div>
                <div id="wrap-global-sliders" style="display:none;margin-top:10px;">
                    <div class="form-group"><label>Размер</label><input type="range" id="prop-global-size" min="0.1"
                            max="5" step="0.1" value="1"></div>
                    <div class="form-group" style="margin-top:5px;"><label>Плотность</label><input type="range"
                            id="prop-global-count" min="0.1" max="5" step="0.1" value="1"></div>
                    <div class="form-group" style="margin-top:5px;"><label>Болтание (px)</label><input type="range"
                            id="prop-global-wobble" min="0" max="50" step="1" value="0"></div>
                </div>
                <div class="form-group row" style="margin-top:15px;"><label style="color:#00ffcc;">🌿 ЭКО</label><input
                        type="checkbox" id="prop-global-eco"></div>
                <div class="form-group row" style="margin-top:5px;"><label>Скрыть линии</label><input type="checkbox"
                        id="prop-global-hidelines"></div>
            </div>
        </div>
        <div class="form-group" id="prop-name-group"><label>Название</label><input type="text" id="prop-name"></div>
        <div id="main-bubble-props">
            <div class="form-group"><label>Форма</label><select id="prop-shape">
                    <option value="circle">Круг</option>
                    <option value="square">Квадрат</option>
                </select></div>
            <div class="form-group"><label>Размер</label><input type="number" id="prop-size" min="100" max="600"
                    step="10"></div>
        </div>
        <div id="color-props">
            <div class="form-group row"><label>Фон (rgba)</label><input type="color" id="prop-bg-color-picker"
                    style="max-width:30px; padding:0; border:none; background:transparent; cursor:pointer;"><input
                    type="text" id="prop-bg-color" style="flex:1;"></div>
            <div class="form-group row"><label>Контур</label><input type="color" id="prop-border-color"
                    style="max-width:50px;"></div>
            <div class="form-group row"><label>Свечение</label><input type="color" id="prop-glow-color"
                    style="max-width:50px;"></div>
        </div>
        <div id="link-props" style="display:none;">
            <div class="layer-box" style="border-color:rgba(0,255,204,0.5);background:rgba(0,255,204,0.05);">
                <div class="form-group row"><label style="color:#00ffcc;">Подчиняться глобальным</label><input
                        type="checkbox" id="prop-link-use-global" checked></div>
                <div class="form-group row" style="margin-top:5px;"><label>Скрыть линии</label><input type="checkbox"
                        id="prop-link-hidelines"></div>
            </div>
            <div class="form-group" style="margin-top:10px;"><label>Траектория</label><select id="prop-link-type">
                    <option value="curved">Плавная</option>
                    <option value="sharp">Ломаная</option>
                    <option value="ortho">Ортогональная</option>
                    <option value="bent">Bent Connector</option>
                </select></div>
            <div class="form-group"><label>Режим линий</label><select id="prop-link-mode">
                    <option value="single">Одинарная</option>
                    <option value="double">Двойная</option>
                </select></div>
            <div class="form-group" id="wrap-gap" style="display:none;"><label>Отступ (px)</label><input type="number"
                    id="prop-link-gap" min="0" max="50"></div>
            <div class="layer-box" style="margin-bottom:0;">
                <div class="form-group row"><label>Фон (подложка)</label><input type="checkbox" id="prop-link-hasbg">
                </div>
                <div id="wrap-bg-props" style="display:none;margin-top:10px;">
                    <div class="form-group"><label>Цвет фона</label><input type="text" id="prop-link-bgcol"></div>
                    <div class="form-group row" style="margin-top:5px;"><label>Ширина</label><input type="number"
                            id="prop-link-bgwid" min="1" max="100" style="max-width:60px;"></div>
                </div>
            </div>
            <div class="layer-box" style="margin-bottom:0;">
                <div class="form-group row"><label>Glow</label><input type="checkbox" id="prop-link-hasglow"></div>
                <div class="form-group row" id="wrap-glow-props" style="display:none;margin-top:5px;">
                    <label>Яркость</label><input type="range" id="prop-link-glowop" min="0" max="100"
                        style="max-width:120px;">
                </div>
            </div>
            <div class="layer-box"><strong style="font-size:12px;">Слой 1</strong>
                <div class="form-group row" style="margin-top:5px;"><label>Цвет</label><input type="color"
                        id="prop-l1-color" style="max-width:40px;"></div>
                <div class="form-group row"><label>Ширина</label><input type="number" id="prop-l1-width" min="1"
                        max="20" style="max-width:60px;"></div>
                <div class="form-group"><label>Анимация</label><select id="prop-l1-anim">
                        <optgroup label="GPU">
                            <option value="none">Нет</option>
                            <option value="pixi_dash_fwd">Штрихи→</option>
                            <option value="pixi_dash_bwd">Штрихи←</option>
                            <option value="pixi_dots_fwd">Точки→</option>
                            <option value="pixi_dots_bwd">Точки←</option>
                        </optgroup>
                        <optgroup label="Частицы">
                            <option value="pixi_shapes">Фигуры</option>
                            <option value="pixi_energy">Энергия</option>
                            <option value="pixi_symbols">Эмодзи</option>
                        </optgroup>
                    </select></div>
                <div class="form-group row"><label>Скорость</label>
                    <select id="prop-l1-speed-mode" style="padding:2px 4px;font-size:11px;margin:0 5px; flex:1;">
                        <option value="abs" selected>Пикс/с</option>
                        <option value="rel">Сек/линию</option>
                    </select>
                    <input type="number" id="prop-l1-speed" min="0.1" max="1000" step="0.5" value="50"
                        style="width:45px;">
                    <label style="display:flex;align-items:center;gap:2px;margin-left:5px;"><input type="checkbox"
                            id="prop-l1-rev" style="width:12px;height:12px;"> Рев</label>
                </div>
                <div id="wrap-l1-part-props"
                    style="display:none;background:rgba(0,0,0,0.2);padding:8px;border-radius:6px;margin-top:5px;border:1px solid rgba(0,255,204,0.2);">
                    <div class="form-group row" id="wrap-l1-shape"><label>Фигура</label><select id="prop-l1-shape"
                            style="max-width:80px;">
                            <option value="drop">Капля</option>
                            <option value="cube">Куб</option>
                            <option value="hex">Гексагон</option>
                            <option value="dec">Круг</option>
                        </select></div>
                    <div class="form-group row" id="wrap-l1-emojis"><label>Эмодзи</label><input type="text"
                            id="prop-l1-emojis" style="max-width:80px;"></div>
                    <div class="form-group row"><label>Размер</label><input type="range" id="prop-l1-size" min="0.1"
                            max="5" step="0.1" value="1" style="max-width:80px;"></div>
                    <div class="form-group row"><label>Плотность</label><input type="range" id="prop-l1-count" min="0.1"
                            max="5" step="0.1" value="1" style="max-width:80px;"></div>
                </div>
            </div>
            <div class="layer-box" id="link-layer-2" style="display:none;"><strong style="font-size:12px;">Слой
                    2</strong>
                <div class="form-group row" style="margin-top:5px;"><label>Цвет</label><input type="color"
                        id="prop-l2-color" style="max-width:40px;"></div>
                <div class="form-group row"><label>Ширина</label><input type="number" id="prop-l2-width" min="1"
                        max="20" style="max-width:60px;"></div>
                <div class="form-group"><label>Анимация</label><select id="prop-l2-anim">
                        <optgroup label="GPU">
                            <option value="none">Нет</option>
                            <option value="pixi_dash_fwd">Штрихи→</option>
                            <option value="pixi_dash_bwd">Штрихи←</option>
                            <option value="pixi_dots_fwd">Точки→</option>
                            <option value="pixi_dots_bwd">Точки←</option>
                        </optgroup>
                        <optgroup label="Частицы">
                            <option value="pixi_shapes">Фигуры</option>
                            <option value="pixi_energy">Энергия</option>
                            <option value="pixi_symbols">Эмодзи</option>
                        </optgroup>
                    </select></div>
                <div class="form-group row"><label>Скорость</label>
                    <select id="prop-l2-speed-mode" style="padding:2px 4px;font-size:11px;margin:0 5px; flex:1;">
                        <option value="abs" selected>Пикс/с</option>
                        <option value="rel">Сек/линию</option>
                    </select>
                    <input type="number" id="prop-l2-speed" min="0.1" max="1000" step="0.5" value="50"
                        style="width:45px;">
                    <label style="display:flex;align-items:center;gap:2px;margin-left:5px;"><input type="checkbox"
                            id="prop-l2-rev" style="width:12px;height:12px;"> Рев</label>
                </div>
                <div id="wrap-l2-part-props"
                    style="display:none;background:rgba(0,0,0,0.2);padding:8px;border-radius:6px;margin-top:5px;border:1px solid rgba(0,255,204,0.2);">
                    <div class="form-group row" id="wrap-l2-shape"><label>Фигура</label><select id="prop-l2-shape"
                            style="max-width:80px;">
                            <option value="drop">Капля</option>
                            <option value="cube">Куб</option>
                            <option value="hex">Гексагон</option>
                            <option value="dec">Круг</option>
                        </select></div>
                    <div class="form-group row" id="wrap-l2-emojis"><label>Эмодзи</label><input type="text"
                            id="prop-l2-emojis" style="max-width:80px;"></div>
                    <div class="form-group row"><label>Размер</label><input type="range" id="prop-l2-size" min="0.1"
                            max="5" step="0.1" value="1" style="max-width:80px;"></div>
                    <div class="form-group row"><label>Плотность</label><input type="range" id="prop-l2-count" min="0.1"
                            max="5" step="0.1" value="1" style="max-width:80px;"></div>
                </div>
            </div>
            <div style="margin-top:15px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;"><strong
                        style="font-size:12px;">Надписи</strong><button id="btn-add-label"
                        style="padding:2px 6px;font-size:11px;">+</button></div>
                <div id="prop-link-labels-list" style="display:flex;flex-direction:column;gap:8px;"></div>
            </div>
            <button id="btn-delete-link" style="background:#a33;margin-top:15px;">Удалить связь</button>
        </div>
        <div id="entity-actions" style="margin-top:10px;display:flex;gap:10px;">
            <button id="btn-copy" style="flex:1;">Копировать</button>
            <button id="btn-delete" style="flex:1;background:#a33;">Удалить</button>
        </div>
    </div>

    <canvas id="pixi-canvas"></canvas>
    <script>
        document.getElementById('pixi-canvas').addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('click', e => { let cm = document.getElementById('ctx-menu'); if (cm && !cm.contains(e.target)) cm.style.display = 'none'; });
    </script>
    <!-- MINIMAP HUD -->
    <div id="minimap-hud" class="glass-panel"
        style="position:fixed; bottom:20px; right:20px; width:150px; height:150px; padding:0; z-index:100; overflow:hidden; border-radius:12px; transition: width 0.3s, height 0.3s;">
        <canvas id="minimap-canvas" style="width:100%; height:100%; display:block; cursor:crosshair;"></canvas>
        <div style="position:absolute; top:5px; right:5px; display:flex; gap:2px;">
            <div id="minimap-drag"
                style="background:rgba(0,0,0,0.5); border-radius:4px; padding:2px 5px; cursor:move; font-size:10px; color:#fff;"
                title="Перетащить">⠿</div>
            <div id="minimap-minimize"
                style="background:rgba(0,0,0,0.5); border-radius:4px; padding:2px 5px; cursor:pointer; font-size:10px; color:#fff;"
                title="Свернуть">_</div>
            <div id="minimap-resize"
                style="background:rgba(0,0,0,0.5); border-radius:4px; padding:2px 5px; cursor:pointer; font-size:10px; color:#fff;"
                title="Размер">🔳</div>
            <div id="minimap-close"
                style="background:rgba(0,0,0,0.5); border-radius:4px; padding:2px 5px; cursor:pointer; font-size:10px; color:#fff;"
                title="Закрыть">❌</div>
        </div>
    </div>

    <script src="bubble_tabs_pixi_engine.js"></script>
</body>

</html>
